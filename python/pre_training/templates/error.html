<!doctype html>
<html>
  <head>
    <title>API Connection Error</title>
    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .error-box {
        background: rgba(255, 0, 0, 0.1);
        border: 1px solid #ff4444;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        max-width: 500px;
      }
      h2 {
        color: #ff4444;
      }
      code {
        background: #000;
        padding: 5px;
        color: #fbbf24;
      }
    </style>
  </head>
  <body>
    <div class="error-box">
      <h2>Connection Error</h2>
      <p>
        We couldn't fetch the weather data. This usually happens if your
        <strong>One Call 3.0</strong> subscription is not yet active.
      </p>
      <p><strong>Message from API:</strong></p>
      <code>{{ message }}</code>
      <br /><br />
      <button
        onclick="location.reload()"
        style="
          background: #fbbf24;
          border: none;
          padding: 10px 20px;
          border-radius: 5px;
          cursor: pointer;
        "
      >
        Retry
      </button>
    </div>
  </body>
</html>
